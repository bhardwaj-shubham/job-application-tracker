services:
  postgres:
    image: postgres:16-alpine
    container_name: job-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-job_tracker}
    ports:
      - "127.0.0.1:5432:5432" # Binds to localhost only to prevent public internet exposure
    volumes:
      - job_tracker_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-job_tracker}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  job_tracker_db_data:
